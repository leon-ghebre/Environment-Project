<!doctype html>
<html lang="en">
<head>
  <!-- Page metadata and title -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Export — Water Quality Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
  <!-- Global styles and theme definitions -->
  <style>
    /* Reset default margins and padding */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Light theme color variables */
    :root {
      --bg-page:     #e6f3e8;
      --bg-surface:  #ffffff;
      --bg-surface2: #f4f9f5;
      --border:      rgba(0,0,0,0.10);
      --border-mid:  rgba(0,0,0,0.18);
      --text-1:      #1a1a18;
      --text-2:      #5f5e5a;
      --text-3:      #888780;
      --accent:      darkblue;
      --critical:    #c0392b;
      --caution:     #e67e22;
      --safe:        #27ae60;
      --font-mono:   "DM Mono", monospace;
      --font-body:   "Exo 2", sans-serif;
      --radius-lg:   12px;
      --radius-md:   8px;
      --shadow:      0 1px 4px rgba(0,0,0,0.06);
    }
    /* Dark theme color overrides */
    [data-theme="dark"] {
      --bg-page:     #0d1a10;
      --bg-surface:  #162019;
      --bg-surface2: #1d2b20;
      --border:      rgba(255,255,255,0.08);
      --border-mid:  rgba(255,255,255,0.15);
      --text-1:      #e8f0e9;
      --text-2:      #9ab09c;
      --text-3:      #607860;
      --accent:      #5b9cf6;
      --critical:    #e05c4b;
      --caution:     #f0a444;
      --safe:        #4cbb7a;
      --shadow:      0 1px 6px rgba(0,0,0,0.4);
    }
    /* High contrast theme for accessibility */
    [data-theme="contrast"] {
      --bg-page:     #000000;
      --bg-surface:  #0a0a0a;
      --bg-surface2: #111111;
      --border:      rgba(255,255,255,0.35);
      --border-mid:  rgba(255,255,255,0.6);
      --text-1:      #ffffff;
      --text-2:      #dddddd;
      --text-3:      #aaaaaa;
      --accent:      #ffff00;
      --critical:    #ff4444;
      --caution:     #ffaa00;
      --safe:        #00ff88;
      --shadow:      0 0 0 1px rgba(255,255,255,0.2);
    }

    body {
      background-color: var(--bg-page);
      color: var(--text-1);
      font-family: var(--font-body);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 0;
      min-height: 100vh;
      margin: 0;
      transition: background-color 0.25s, color 0.25s;
    }

    .dashboard {
      width: 100%;
      max-width: 1200px;
      padding: 0 1rem;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* Topbar: header with title and controls */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .name {
      font-size: 25px;
      font-weight: 600;
      color: var(--accent);
    }
    .date-strip {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 3px;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* Theme toggle buttons (light/dark/contrast) */
    .theme-toggle {
      display: flex;
      gap: 4px;
      background: var(--bg-surface);
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      padding: 3px;
    }
    .theme-btn {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.05em;
      padding: 4px 9px;
      border-radius: 5px;
      border: none;
      background: transparent;
      color: var(--text-3);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .theme-btn.active {
      background: var(--accent);
      color: var(--bg-page);
    }
    [data-theme="contrast"] .theme-btn.active { color: #000; }

    .selecter {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text-1);
      background: var(--bg-surface);
      border: 0.5px solid var(--accent);
      border-radius: var(--radius-md);
      padding: 7px 30px 7px 14px;
      cursor: pointer;
    }

    /* Summary statistics display area */
    .summary-strip {
      display: flex;
      gap: 2.5rem;
      padding-bottom: 1rem;
      border-bottom: 0.5px solid var(--border);
      flex-wrap: wrap;
    }
    .summary-item label {
      display: block;
      font-size: 10px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-3);
      margin-bottom: 3px;
    }
    .summary-item span {
      font-size: 15px;
      color: var(--text-1);
    }

    /* Main export form and preview layout */
    .export-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 1.25rem;
      align-items: start;
    }
    @media (max-width: 700px) { .export-layout { grid-template-columns: 1fr; } }

    /* Card container for forms and preview */
    .card {
      background: var(--bg-surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
    }

    /* Form input elements and labels */
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label {
      font-size: 10px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-3);
    }
    .form-group .selecter { width: 100%; padding: 8px 14px; }

    .date-range-row { display: flex; gap: 6px; align-items: center; }
    .date-input {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-1);
      background: var(--bg-surface);
      border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md);
      padding: 7px 10px;
      width: 100%;
    }
    .date-input:focus { outline: none; border-color: var(--accent); }
    .date-sep { font-size: 10px; font-family: var(--font-mono); color: var(--text-3); flex-shrink: 0; }

    /* Export and action buttons */
    .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .btn {
      font-family: var(--font-body);
      font-size: 13px;
      border-radius: var(--radius-md);
      padding: 9px 16px;
      cursor: pointer;
      border: none;
      text-align: center;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-primary { background: var(--accent); color: var(--bg-page); }
    [data-theme="contrast"] .btn-primary { color: #000; }
    .btn-ghost {
      background: transparent;
      border: 0.5px solid var(--accent);
      color: var(--accent);
    }

    /* Preview section header and metadata */
    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .btn-sm { font-size: 12px; padding: 5px 12px; }
    .ex-meta { font-size: 11px; font-family: var(--font-mono); color: var(--text-3); }

    /* Data table with scrolling for small screens */
    .table-wrapper {
      overflow-x: auto;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border);
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      white-space: nowrap;
    }
    .data-table thead tr { border-bottom: 0.5px solid var(--border); }
    .data-table th {
      padding: 10px 14px;
      text-align: left;
      font-size: 10px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-3);
      font-weight: 400;
    }
    .data-table td {
      padding: 10px 14px;
      color: var(--text-1);
      border-bottom: 0.5px solid var(--border);
    }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover { background: var(--bg-surface2); }
    .muted { color: var(--text-3); font-style: italic; font-size: 12px; }
  </style>

  <link rel="stylesheet" href="/static/css/theme.css" />
  <script src="/static/js/theme.js"></script>
  
</head>
<body>
  <main class="dashboard" role="main">

    <header class="topbar">
      <div>
        <div class="name">Export Data</div>
        <div class="date-strip" id="today-date">—</div>
      </div>
      <div class="topbar-right">
        <select class="selecter" onchange="if(this.value) window.location.href=this.value">
          <option value="/">Home</option>
          <option value="/alerts.html">Alert Log</option>
          <option value="/advanced-graphs.html">Advanced Graphs</option>
          <option value="/export.html" selected>Export</option>
        </select>
      </div>
    </header>

    <!-- Summary bar: shows currently selected site and period -->
    <div class="summary-strip">
      <div class="summary-item">
        <label>Site</label>
        <span id="sum-site">All Sites</span>
      </div>
      <div class="summary-item">
        <label>Period</label>
        <span id="sum-period">Last 30 days</span>
      </div>
    </div>

    <div class="export-layout">

      <div class="card">
        <div class="card-title">Export Settings</div>

        <div class="form-group">
          <label>Site</label>
          <select id="ex-site" class="selecter" onchange="updateSummary()">
            
            <option value="site_upstream">Upstream</option>
            <option value="site_downstream">Downstream</option>
            <option value="site_reservoir">Reservoir</option>
          </select>
        </div>

        <div class="form-group">
          <label>Date range</label>
          <select id="ex-days" class="selecter" onchange="onDaysChange()">
            <option value="7">Last 7 days</option>
            <option value="14">Last 14 days</option>
            <option value="30" selected>Last 30 days</option>
            <option value="90">Last 90 days</option>
            <option value="custom">Custom…</option>
          </select>
        </div>

        <div class="form-group" id="custom-date-group" style="display:none;">
          <label>Custom range</label>
          <div class="date-range-row">
            <input type="date" id="ex-from" class="date-input" onchange="updateSummary()" />
            <span class="date-sep">→</span>
            <input type="date" id="ex-to" class="date-input" onchange="updateSummary()" />
          </div>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" onclick="doExport('csv')">⬇ Download CSV</button>
        </div>
      </div>
      </div>

    </div>
  </main>
  <script type="module" src="/static/js/export.js"></script>
</body>
</html>
