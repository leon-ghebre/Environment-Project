[flake8]
max-line-length = 100 
#chosen length of 100 (explained in wiki - backend coding standards)
extend-ignore = E203, W503 
#ignore flake8's E203 and @503 rule as they contradict with Black
exclude = 
#skips these directories
    .git,
    __pycache__,
    venv,
    .venv,
    data

[tool:pytest]
testpaths = tests
