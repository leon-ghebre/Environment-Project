repos:
  #Black: automatically formats code before each commit
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
        - id: black

  #Flake8 - catches style issues, unused imports and undefined variables
  - repo: https://gitlab.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
      
