<!doctype html>
<html lang="en">
<head>
  <!-- Page metadata and title -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Alert Log — Water Quality Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />
  <!-- Global styles and theme definitions -->
  <style>
    /* Reset default margins and padding */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Light theme color variables */
    :root {
      --bg-page:       #e6f3e8;
      --bg-surface:    #ffffff;
      --bg-surface2:   #f4f4f2;
      --border:        rgba(0,0,0,0.10);
      --border-mid:    rgba(0,0,0,0.18);
      --text-1:        #1a1a18;
      --text-2:        #5f5e5a;
      --text-3:        #888780;
      --accent:        darkblue;
      --critical:      #c0392b;
      --caution:       #e67e22;
      --safe:          #27ae60;
      --font-mono:     "DM Mono", monospace;
      --font-body:     "Exo 2", sans-serif;
      --radius-lg:     12px;
      --radius-md:     8px;
      --shadow:        0 1px 4px rgba(0,0,0,0.06);
      --color-ph:        #1835FA;
      --color-turbidity: #EF9F27;
      --color-flow:      #1D9E75;
      --color-level:     #9B59B6;
    }
    /* Dark theme color overrides */
    [data-theme="dark"] {
      --bg-page:     #0d1a10;
      --bg-surface:  #162019;
      --bg-surface2: #1d2b20;
      --border:      rgba(255,255,255,0.08);
      --border-mid:  rgba(255,255,255,0.15);
      --text-1:      #e8f0e9;
      --text-2:      #9ab09c;
      --text-3:      #607860;
      --accent:      #5b9cf6;
      --critical:    #e05c4b;
      --caution:     #f0a444;
      --safe:        #4cbb7a;
      --shadow:      0 1px 6px rgba(0,0,0,0.4);
    }
    /* High contrast theme for accessibility */
    [data-theme="contrast"] {
      --bg-page:     #000000;
      --bg-surface:  #0a0a0a;
      --bg-surface2: #111111;
      --border:      rgba(255,255,255,0.35);
      --border-mid:  rgba(255,255,255,0.6);
      --text-1:      #ffffff;
      --text-2:      #dddddd;
      --text-3:      #aaaaaa;
      --accent:      #ffff00;
      --critical:    #ff4444;
      --caution:     #ffaa00;
      --safe:        #00ff88;
      --shadow:      0 0 0 1px rgba(255,255,255,0.2);
    }

    body {
      background-color: var(--bg-page);
      color: var(--text-1);
      font-family: var(--font-body);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 0;
      min-height: 100vh;
      margin: 0;
      transition: background-color 0.25s, color 0.25s;
    }
    .dashboard {
      width: 100%;
      max-width: 1200px;
      padding: 0 1rem;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* Topbar: header with title and controls */
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .name { font-size: 25px; font-weight: 600; color: var(--accent); }
    .date-strip { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 3px; }
    .topbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    /* Theme toggle buttons (light/dark/contrast) */
    .theme-toggle { display: flex; gap: 4px; background: var(--bg-surface); border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); padding: 3px; }
    .theme-btn { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.05em; padding: 4px 9px; border-radius: 5px; border: none; background: transparent; color: var(--text-3); cursor: pointer; transition: background 0.15s, color 0.15s; }
    .theme-btn.active { background: var(--accent); color: var(--bg-page); }
    [data-theme="contrast"] .theme-btn.active { color: #000; }

    .selecter { font-family: var(--font-body); font-size: 13px; color: var(--text-1); background: var(--bg-surface); border: 0.5px solid var(--accent); border-radius: var(--radius-md); padding: 7px 30px 7px 14px; cursor: pointer; }

    /* Summary statistics display area */
    .summary-strip { display: flex; gap: 2.5rem; padding-bottom: 1rem; border-bottom: 0.5px solid var(--border); flex-wrap: wrap; }
    .summary-item label { display: block; font-size: 10px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-3); margin-bottom: 3px; }
    .summary-item span { font-size: 15px; color: var(--text-1); }

    /* Filter controls container */
    .filter-box { background: var(--bg-surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1.25rem; box-shadow: var(--shadow); }
    .filter-group { display: flex; flex-direction: column; gap: 8px; }
    .filter-label { font-size: 10px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-3); }
    .filter-selector,
    .filter-date { font-family: var(--font-mono); font-size: 13px; color: var(--text-1); background: var(--bg-surface2); border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); padding: 7px 10px; width: 100%; cursor: pointer; appearance: none; }

    /* Color-code severity levels in dropdown */
    .filter-selector option[value="high"]   { color: var(--critical); }
    .filter-selector option[value="medium"] { color: var(--caution);  }

    .filter-group.sensors { grid-column: span 2; }
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .sensor-checkbox { position: relative; }
    .sensor-checkbox label { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 100px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border-mid); background: var(--bg-surface2); color: var(--text-3); transition: border-color 0.15s, background 0.15s, color 0.15s; }
    .sensor-checkbox input { position: absolute; opacity: 0; width: 0; height: 0; }
    .sensor-checkbox input:checked + label { color: var(--text-1); }
    .sensor-checkbox.ph         input:checked + label { border-color: var(--color-ph);        background: rgba(24,53,250,0.08); }
    .sensor-checkbox.turbidity  input:checked + label { border-color: var(--color-turbidity); background: rgba(239,159,39,0.08); }
    .sensor-checkbox.flow       input:checked + label { border-color: var(--color-flow);       background: rgba(29,158,117,0.08); }
    .sensor-checkbox.level      input:checked + label { border-color: var(--color-level);      background: rgba(155,89,182,0.08); }
    .swatch { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* Alert data table container */
    .table-card { background: var(--bg-surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); }
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table thead tr { border-bottom: 0.5px solid var(--border); }
    .data-table th { padding: 12px 16px; text-align: left; font-size: 10px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-3); font-weight: 400; }
    .data-table td { padding: 12px 16px; color: var(--text-1); border-bottom: 0.5px solid var(--border); }
    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover { background: var(--bg-surface2); }
    .sensor-cell { display: flex; align-items: center; gap: 6px; }
    .muted { color: var(--text-3); font-style: italic; }
    .sev-high   { color: var(--critical); font-weight: 600; }
    .sev-medium { color: var(--caution);  font-weight: 600; }
  </style>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}" />
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>
<body>
  <main class="dashboard" role="main">

    <header class="topbar">
      <div>
        <div class="name">Alert Log</div>
        <div class="date-strip" id="today-date">—</div>
      </div>
      <div class="topbar-right">
        <div class="theme-toggle" role="group" aria-label="Theme">
          <button class="theme-btn" data-t="light"    onclick="setTheme('light')">LIGHT</button>
          <button class="theme-btn" data-t="dark"     onclick="setTheme('dark')">DARK</button>
          <button class="theme-btn" data-t="contrast" onclick="setTheme('contrast')">HC</button>
        </div>
        <select class="selecter" onchange="if(this.value) window.location.href=this.value">
          <option value="/">Home</option>
          <option value="/alerts.html" selected>Alert Log</option>
          <option value="/trends.html">Advanced Graphs</option>
          <option value="/export.html">Export</option>
        </select>
      </div>
    </header>

    <div class="summary-strip" role="status" aria-live="polite">
      <div class="summary-item"><label>Total alerts</label><span id="al-total">—</span></div>
      <div class="summary-item"><label>High severity</label><span id="al-high" style="color:var(--critical)">—</span></div>
      <div class="summary-item"><label>Medium severity</label><span id="al-medium" style="color:var(--caution)">—</span></div>
      <div class="summary-item"><label>Period</label><span id="al-period">—</span></div>
    </div>

    <section class="filter-box" aria-label="Alert filters">

      <div class="filter-group">
        <span class="filter-label">Site</span>
        <select class="filter-selector" id="siteSelector" onchange="loadAlerts()">
          <option value="">All Sites</option>
          <option value="Upstream">Upstream</option>
          <option value="Downstream">Downstream</option>
          <option value="Reservoir">Reservoir</option>
        </select>
      </div>

      <div class="filter-group">
        <span class="filter-label">Severity</span>
        <select class="filter-selector" id="severityFilter" onchange="loadAlerts()">
          <option value="">All</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
        </select>
      </div>

      <div class="filter-group">
        <span class="filter-label">From</span>
        <input class="filter-date" type="date" id="dateFrom" onchange="loadAlerts()" />
      </div>

      <div class="filter-group">
        <span class="filter-label">To</span>
        <input class="filter-date" type="date" id="dateTo" onchange="loadAlerts()" />
      </div>

      <div class="filter-group sensors">
        <span class="filter-label">Sensors</span>
        <div class="checkbox-group">
          <div class="sensor-checkbox ph">
            <input type="checkbox" id="checkPh" value="ph" checked onchange="loadAlerts()" />
            <label for="checkPh"><span class="swatch" style="background:var(--color-ph)"></span>pH</label>
          </div>
          <div class="sensor-checkbox turbidity">
            <input type="checkbox" id="checkTurbidity" value="turbidity" checked onchange="loadAlerts()" />
            <label for="checkTurbidity"><span class="swatch" style="background:var(--color-turbidity)"></span>Turbidity</label>
          </div>
          <div class="sensor-checkbox flow">
            <input type="checkbox" id="checkFlow" value="flow" checked onchange="loadAlerts()" />
            <label for="checkFlow"><span class="swatch" style="background:var(--color-flow)"></span>Flow</label>
          </div>
          <div class="sensor-checkbox level">
            <input type="checkbox" id="checkLevel" value="level" checked onchange="loadAlerts()" />
            <label for="checkLevel"><span class="swatch" style="background:var(--color-level)"></span>Water Level</label>
          </div>
        </div>
      </div>

    </section>

    <section>
      <div class="table-card">
        <table class="data-table">
          <thead>
            <tr><th>Site</th><th>Sensor</th><th>Time</th><th>Severity</th></tr>
          </thead>
          <tbody id="al-list">
            <tr><td colspan="4" class="muted">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>
  <script type="module" src="/assets/static/js/alerts.js"></script>
</body>
</html>
