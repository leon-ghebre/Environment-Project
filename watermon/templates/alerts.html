{% extends "base.html" %}
{% set active = "alerts" %}
{% block title %}Alerts — Water Monitoring{% endblock %}
{% block content %}

<div class="toolbar">
  <h1 class="page-title">Alerts</h1>
  <div class="toolbar-right">
    <select id="al-days" class="select-input">
      <option value="7" selected>Last 7 days</option>
      <option value="14">Last 14 days</option>
      <option value="30">Last 30 days</option>
    </select>
  </div>
</div>

<div class="alert-summary" id="al-summary">
  <div class="stat-label">Total</div>
</div>

<section class="section">
  <h2 class="section-title">Alert Log</h2>
  <div class="table-wrapper">
    <table class="data-table">
      <thead>
        <tr>
          <th>Site</th>
          <th>Type</th>
          <th>Time</th>
          <th>Severity</th>
        </tr>
      </thead>
      <tbody id="al-list">
        <tr>
          <td colspan="4" class="muted">Loading…</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/alerts.js') }}"></script>
{% endblock %}
