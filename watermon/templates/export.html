<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Export — Water Quality Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-surface: #ffffff;
      --border-subtle: rgba(0,0,0,0.10);
      --border-default: rgba(0,0,0,0.18);
      --radius-lg: 12px;
      --radius-md: 8px;
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-tertiary: #888780;
      --font-mono: "DM Mono", monospace;
      --font-exo-2: "Exo 2", sans-serif;
    }

    body {
      background-color: #e6f3e8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 0;
      min-height: 100vh;
      margin: 0;
    }

    .dashboard {
      width: 100%;
      max-width: 1200px;
      padding: 0 1rem;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .name {
      font-size: 25px;
      font-weight: 600;
      font-family: var(--font-exo-2);
      color: darkblue;
    }

    .date-strip {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .selecter {
      font-family: var(--font-exo-2);
      font-size: 13px;
      color: var(--text-primary);
      background: var(--bg-surface);
      border: 0.5px solid darkblue;
      border-radius: var(--radius-md);
      padding: 7px 30px 7px 14px;
      cursor: pointer;
    }

    /* ── Summary strip ── */
    .summary-strip {
      display: flex;
      gap: 2.5rem;
      padding-bottom: 1rem;
      border-bottom: 0.5px solid var(--border-subtle);
      flex-wrap: wrap;
    }

    .summary-item label {
      display: block;
      font-size: 10px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-tertiary);
      margin-bottom: 3px;
    }

    .summary-item span {
      font-family: var(--font-exo-2);
      font-size: 15px;
      color: var(--text-primary);
    }

    /* ── Export layout ── */
    .export-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 1.25rem;
      align-items: start;
    }

    @media (max-width: 700px) {
      .export-layout { grid-template-columns: 1fr; }
    }

    /* ── Cards ── */
    .card {
      background: var(--bg-surface);
      border: 0.5px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card-title {
      font-size: 13px;
      font-weight: 500;
      font-family: var(--font-exo-2);
      color: var(--text-secondary);
    }

    /* ── Form groups ── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-group label {
      font-size: 10px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-tertiary);
    }

    .form-group .selecter {
      width: 100%;
      padding: 8px 14px;
    }

    /* ── Date inputs ── */
    .date-range-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .date-input {
      flex: 1;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-primary);
      background: var(--bg-surface);
      border: 0.5px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 7px 10px;
      width: 100%;
    }

    .date-input:focus {
      outline: none;
      border-color: darkblue;
    }

    .date-sep {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
      flex-shrink: 0;
    }

    /* ── Buttons ── */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }

    .btn {
      font-family: var(--font-exo-2);
      font-size: 13px;
      border-radius: var(--radius-md);
      padding: 9px 16px;
      cursor: pointer;
      border: none;
      text-align: center;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.8; }

    .btn-primary {
      background: darkblue;
      color: #fff;
    }

    .btn-ghost {
      background: transparent;
      border: 0.5px solid darkblue;
      color: darkblue;
    }

    /* ── Preview card ── */
    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn-sm {
      font-size: 12px;
      padding: 5px 12px;
    }

    .ex-meta {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
    }

    /* ── Table ── */
    .table-wrapper {
      overflow-x: auto;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-subtle);
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-exo-2);
      font-size: 12px;
      white-space: nowrap;
    }

    .data-table thead tr {
      border-bottom: 0.5px solid var(--border-subtle);
    }

    .data-table th {
      padding: 10px 14px;
      text-align: left;
      font-size: 10px;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-tertiary);
      font-weight: 400;
    }

    .data-table td {
      padding: 10px 14px;
      color: var(--text-primary);
      border-bottom: 0.5px solid var(--border-subtle);
    }

    .data-table tbody tr:last-child td { border-bottom: none; }
    .data-table tbody tr:hover { background: rgba(0,0,0,0.02); }

    .muted {
      color: var(--text-tertiary);
      font-style: italic;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="dashboard" role="main">

    <!-- Topbar -->
    <header class="topbar">
      <div>
        <div class="name">Export Data</div>
        <div class="date-strip" id="today-date">—</div>
      </div>
      <select class="selecter" id="page-nav" onchange="navigatePage(this.value)">
        <option value="dashboard.html">Home</option>
        <option value="alerts.html">Alert Log</option>
        <option value="graphs.html">Advanced Graphs</option>
        <option value="export.html" selected>Export</option>
      </select>
    </header>

    <!-- Summary strip -->
    <div class="summary-strip">
      <div class="summary-item">
        <label>Site</label>
        <span id="sum-site">All Sites</span>
      </div>
      <div class="summary-item">
        <label>Period</label>
        <span id="sum-period">Last 30 days</span>
      </div>
      <div class="summary-item">
        <label>Rows previewed</label>
        <span id="sum-rows">—</span>
      </div>
    </div>

    <!-- Export layout -->
    <div class="export-layout">

      <!-- Settings card -->
      <div class="card">
        <div class="card-title">Export Settings</div>

        <div class="form-group">
          <label>Site</label>
          <select id="ex-site" class="selecter" onchange="updateSummary()">
            <option value="">All Sites</option>
            <option>Upstream</option>
            <option>Downstream</option>
            <option>Reservoir</option>
          </select>
        </div>

        <div class="form-group">
          <label>Date range</label>
          <select id="ex-days" class="selecter" onchange="onDaysChange()">
            <option value="7">Last 7 days</option>
            <option value="14">Last 14 days</option>
            <option value="30" selected>Last 30 days</option>
            <option value="90">Last 90 days</option>
            <option value="custom">Custom…</option>
          </select>
        </div>

        <div class="form-group" id="custom-date-group" style="display:none;">
          <label>Custom range</label>
          <div class="date-range-row">
            <input type="date" id="ex-from" class="date-input" onchange="updateSummary()" />
            <span class="date-sep">→</span>
            <input type="date" id="ex-to" class="date-input" onchange="updateSummary()" />
          </div>
        </div>

        <div class="btn-group">
          <button class="btn btn-primary" onclick="doExport('csv')">⬇ Download CSV</button>
          <button class="btn btn-ghost"   onclick="doExport('json')">⬇ Download JSON</button>
        </div>
      </div>

      <!-- Preview card -->
      <div class="card">
        <div class="preview-header">
          <div class="card-title">Preview</div>
          <button class="btn btn-ghost btn-sm" onclick="refreshPreview()">↻ Refresh</button>
        </div>
        <div class="ex-meta" id="ex-meta"></div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Timestamp</th>
                <th>Site</th>
                <th>pH</th>
                <th>Turbidity</th>
                <th>Conductivity</th>
                <th>Water Temp</th>
                <th>Water Level</th>
                <th>Air Temp</th>
                <th>Humidity</th>
                <th>Rainfall</th>
              </tr>
            </thead>
            <tbody id="ex-tbody">
              <tr><td colspan="10" class="muted">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <script>
    // ── Date display ──
    document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-GB', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    // ── Navigation ──
    function navigatePage(page) {
      if (page) window.location.href = page;
    }

    // ── Custom date toggle ──
    function onDaysChange() {
      const val = document.getElementById('ex-days').value;
      const group = document.getElementById('custom-date-group');
      group.style.display = val === 'custom' ? 'flex' : 'none';
      if (val === 'custom') {
        // Default: today and 30 days ago
        const to   = new Date();
        const from = new Date();
        from.setDate(from.getDate() - 30);
        document.getElementById('ex-to').value   = to.toISOString().slice(0, 10);
        document.getElementById('ex-from').value = from.toISOString().slice(0, 10);
      }
      updateSummary();
    }

    // ── Summary bar sync ──
    function updateSummary() {
      const site = document.getElementById('ex-site').value || 'All Sites';
      const days = document.getElementById('ex-days').value;
      document.getElementById('sum-site').textContent = site;
      if (days === 'custom') {
        const from = document.getElementById('ex-from').value;
        const to   = document.getElementById('ex-to').value;
        document.getElementById('sum-period').textContent =
          from && to ? `${from} → ${to}` : 'Custom range';
      } else {
        document.getElementById('sum-period').textContent = `Last ${days} days`;
      }
    }

    // ── Build API params ──
    function getParams() {
      const site = document.getElementById('ex-site').value;
      const days = document.getElementById('ex-days').value;
      if (days === 'custom') {
        const from = document.getElementById('ex-from').value;
        const to   = document.getElementById('ex-to').value;
        return `site=${encodeURIComponent(site)}&from=${from}&to=${to}`;
      }
      return `site=${encodeURIComponent(site)}&days=${days}`;
    }

    // ── Preview ──
    async function refreshPreview() {
      const params = getParams();
      const url    = `/api/readings?${params}&limit=20`;
      const tbody = document.getElementById('ex-tbody');
      const meta  = document.getElementById('ex-meta');
      tbody.innerHTML = '<tr><td colspan="10" class="muted">Loading…</td></tr>';

      try {
        const res  = await fetch(url);
        const rows = await res.json();
        renderPreview(rows, meta, tbody);
      } catch {
        // Demo data fallback
        const demo = Array.from({ length: 8 }, (_, i) => ({
          timestamp:   new Date(Date.now() - i * 3600000).toISOString(),
          site:        ['Upstream','Downstream','Reservoir'][i % 3],
          ph:          (7 + Math.random()).toFixed(2),
          turbidity:   (Math.random() * 10).toFixed(1),
          conductivity:(Math.random() * 500).toFixed(0),
          water_temp:  (15 + Math.random() * 5).toFixed(1),
          water_level: (Math.random() * 2).toFixed(2),
          air_temp:    (18 + Math.random() * 4).toFixed(1),
          humidity:    (60 + Math.random() * 20).toFixed(0),
          rainfall:    (Math.random() * 5).toFixed(1),
        }));
        renderPreview(demo, meta, tbody);
      }
    }

    function renderPreview(rows, meta, tbody) {
      document.getElementById('sum-rows').textContent = rows.length;
      meta.textContent = `Showing ${rows.length} rows (preview only)`;
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="10" class="muted">No data found.</td></tr>';
        return;
      }
      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>${fmtDate(r.timestamp)}</td>
          <td>${r.site || '—'}</td>
          <td>${r.ph ?? '—'}</td>
          <td>${r.turbidity ?? '—'}</td>
          <td>${r.conductivity ?? '—'}</td>
          <td>${r.water_temp ?? '—'}</td>
          <td>${r.water_level ?? '—'}</td>
          <td>${r.air_temp ?? '—'}</td>
          <td>${r.humidity ?? '—'}</td>
          <td>${r.rainfall ?? '—'}</td>
        </tr>`).join('');
    }

    function fmtDate(ts) {
      if (!ts) return '—';
      return new Date(ts).toLocaleString('en-GB', {
        day: '2-digit', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    // ── Export ──
    async function doExport(fmt) {
      const params = getParams();
      const url    = `/api/export?${params}&format=${fmt}`;
      try {
        const res  = await fetch(url);
        const blob = await res.blob();
        const a    = document.createElement('a');
        a.href     = URL.createObjectURL(blob);
        const days = document.getElementById('ex-days').value;
        const tag  = days === 'custom'
          ? `${document.getElementById('ex-from').value}_${document.getElementById('ex-to').value}`
          : `${days}d`;
        a.download = `water-data-${tag}.${fmt}`;
        a.click();
      } catch {
        alert('Export failed — check your connection.');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateSummary();
      refreshPreview();
    });
  </script>
</body>
</html>
